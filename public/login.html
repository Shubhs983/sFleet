<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SFleet — Sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/login.css">
</head>
<body>

<div class="wrap">
    <div class="brand">
        <span class="beacon"><span class="beacon-ring"></span><span class="beacon-core"></span></span>
        <span class="brand-name">S<span>Fleet</span></span>
    </div>
    <p class="tagline">A safe light, always nearby</p>

    <div class="card">
        <h2 id="formTitle">Welcome back</h2>
        <p class="sub" id="formSub">Sign in to continue</p>

        <div id="nameField" class="field hidden">
            <label for="name">Full name</label>
            <input type="text" id="name" placeholder="Jordan Lee">
        </div>

        <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="you@example.com">
        </div>

        <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <div id="roleField" class="field hidden">
            <label>I am a</label>
            <div class="role-toggle">
                <button type="button" id="roleCustomerBtn" class="active" onclick="selectRole('customer')">Customer</button>
                <button type="button" id="roleDriverBtn" onclick="selectRole('driver')">Driver</button>
            </div>
        </div>

        <button class="submit-btn" id="submitBtn" onclick="handleSubmit()">Sign in</button>

        <p class="toggle-link">
            <span id="toggleText">New to SFleet? <a onclick="toggleForm()">Create an account</a></span>
        </p>

        <p id="message"></p>
    </div>

    <p class="safety-note">Built with women's safety in mind — live tracking for every ride, day or night.</p>
</div>

<script src="/js/login.js"></script>
</body>
</html>
