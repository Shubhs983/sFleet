<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SFleet — Driver</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/driver.css">
</head>
<body>

<div class="topbar">
    <span class="brand">S<span>Fleet</span></span>
    <button onclick="logout()">Log out</button>
</div>

<div class="container">
    <div class="card">
        <h3>My status</h3>
        <p>Availability: <span class="status-badge" id="availabilityBadge">Checking...</span></p>
        <button class="btn" id="toggleAvailBtn" onclick="toggleAvailability()">Go available</button>
    </div>

    <div class="card">
        <h3>My orders</h3>
        <div id="ordersList" class="empty">Loading orders...</div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/driver.js"></script>
</body>
</html>
