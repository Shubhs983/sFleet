<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SFleet — Customer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/customer.css">
</head>
<body>

<div class="topbar">
    <span class="brand">S<span>Fleet</span></span>
    <button onclick="logout()">Log out</button>
</div>

<div class="container">
    <div class="card">
        <h3>Nearby drivers</h3>
        <div id="driversList" class="empty">Finding drivers near you...</div>
    </div>

    <div class="card">
        <h3>Request a ride</h3>
        <button class="btn" id="requestBtn" onclick="createOrder()">Request ride</button>
    </div>

    <div class="card">
        <h3>Live tracking</h3>
        <p>Status: <span class="status-badge" id="orderStatus">No active order</span></p>
        <div id="locationLog"></div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/customer.js"></script>
</body>
</html>
